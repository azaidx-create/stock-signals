name: Daily Stock Signal Check

on:
  schedule:
    # 9:45 PM UTC = 12:45 AM Saudi time the next day.
    # New York: 5:45 PM during daylight-saving time, 4:45 PM during standard time.
    - cron: '45 21 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-signals:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal check and build results page
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python signal_check.py

      - name: Commit and push updated results page
        run: |
          git config user.name "signal-bot"
          git config user.email "signal-bot@users.noreply.github.com"
          git add docs/index.html

          if git diff --staged --quiet; then
            echo "No website changes to commit."
            exit 0
          fi

          git commit -m "Update daily signal results"
          git pull --rebase origin main
          git push origin main
