name: Rotation Strategy Research

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    paths:
      - rotation_research.py
      - .github/workflows/rotation_research.yml

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run rotation research
        run: python rotation_research.py
      - name: Upload rotation results
        uses: actions/upload-artifact@v4
        with:
          name: rotation-research-results
          path: data/rotation_research.json
